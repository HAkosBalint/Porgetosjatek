<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szerencse RPG - Hősök Hajnala</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        .sidebar { width: 60px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 15px; z-index: 10; }
        .side-btn { width: 45px; height: 45px; background: #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 22px; transition: 0.3s; border: 1px solid #444; }
        .side-btn:hover { background: gold; color: black; }
        .logout-btn { position: fixed; top: 15px; right: 15px; width: 45px; height: 45px; background: rgba(255, 215, 0, 0.1); border: 2px solid gold; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; }
        .main-content { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 10px; position: relative; }
        .game-container { background: #1e1e1e; padding: 25px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; border: 1px solid #333; text-align: center; }

        /* GENERÁLT KERÉK STÍLUSA */
        .wheel-wrapper { position: relative; width: 280px; height: 280px; margin: 20px auto; }
        #lucky-wheel-canvas { 
            width: 100%; height: 100%; 
            border-radius: 50%; 
            border: 5px solid gold; 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .wheel-pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 35px; color: gold; z-index: 200; text-shadow: 0 0 10px black; }

        .stat-box { display: flex; gap: 10px; background: #111; padding: 10px 15px; border-radius: 30px; border: 1px solid gold; margin-top: 15px; font-weight: bold; font-size: 0.85em; }
        .hidden { display: none !important; }
        .primary-btn { width: 100%; padding: 14px; background: gold; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #333; color: white; }
    </style>
</head>
<body>

    <div id="logout-ui" class="logout-btn hidden" onclick="logout()">🚪</div>
    <div id="sidebar" class="sidebar hidden">
        <div class="side-btn" onclick="showSection('game-ui')">👤</div>
        <div class="side-btn" onclick="showSection('wheel-ui')">🎡</div>
    </div>

    <div class="main-content">
        <div class="game-container" id="auth-box">
            <h2 style="color: gold;">Hősök Hajnala</h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="password" placeholder="Jelszó">
            <button class="primary-btn" id="auth-btn">Belépés</button>
        </div>

        <div class="game-container hidden" id="wheel-ui">
            <h2 style="color: gold; margin-bottom: 10px;">Szerencsekerék</h2>
            <div class="wheel-wrapper">
                <div class="wheel-pointer">▼</div>
                <canvas id="lucky-wheel-canvas" width="500" height="500"></canvas>
            </div>
            <button class="primary-btn" id="spin-btn" onclick="spinWheel()">Pörgetés!</button>
            <p id="wheel-result" style="margin-top: 15px; font-weight: bold; color: gold;"></p>
        </div>

        <div class="game-container hidden" id="game-ui">
            <h2 id="char-name-display" style="color: gold;">-</h2>
            <img id="active-char-img" src="" style="width: 150px; border-radius: 15px; border: 2px solid gold;">
            <div class="stat-box">
                <span id="stat-hp" style="color: #ff4d4d;">❤️ HP: 0</span>
                <span id="stat-atk" style="color: gold;">⚔️ ATK: 0</span>
                <span id="stat-gold" style="color: #ffd700;">💰 0</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAfEx0o1BDUjMiD6plcBGxrBh_n_bUHlI8", authDomain: "porgetosjatek.firebaseapp.com", projectId: "porgetosjatek", storageBucket: "porgetosjatek.firebasestorage.app", appId: "1:460225202442:web:701d5416bd407aa97d92f3" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const PRIZES = [
            { label: "100 Gold", color: "#1a1a1a", type: 'gold', val: 100 },
            { label: "+5 HP", color: "#2a2a2a", type: 'hp', val: 5 },
            { label: "20 Gold", color: "#1a1a1a", type: 'gold', val: 20 },
            { label: "+2 ATK", color: "#2a2a2a", type: 'atk', val: 2 },
            { label: "200 Gold", color: "#1a1a1a", type: 'gold', val: 200 },
            { label: "+10 HP", color: "#2a2a2a", type: 'hp', val: 10 },
            { label: "50 Gold", color: "#1a1a1a", type: 'gold', val: 50 },
            { label: "+1 ATK", color: "#2a2a2a", type: 'atk', val: 1 },
            { label: "10 Gold", color: "#1a1a1a", type: 'gold', val: 10 },
            { label: "+2 HP", color: "#2a2a2a", type: 'hp', val: 2 },
            { label: "JACKPOT", color: "#d4af37", type: 'gold', val: 500 },
            { label: "+5 ATK", color: "#2a2a2a", type: 'atk', val: 5 }
        ];

        let currentUser = null, isSpinning = false;

        function drawWheel() {
            const canvas = document.getElementById("lucky-wheel-canvas");
            const ctx = canvas.getContext("2d");
            const centerX = 250, centerY = 250, radius = 240;

            PRIZES.forEach((prize, i) => {
                const angle = (2 * Math.PI) / PRIZES.length;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, i * angle, (i + 1) * angle);
                ctx.fillStyle = prize.color;
                ctx.fill();
                ctx.strokeStyle = "gold";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(i * angle + angle / 2);
                ctx.fillStyle = "white";
                ctx.font = "bold 16px Arial";
                ctx.textAlign = "right";
                ctx.fillText(prize.label, radius - 20, 10);
                ctx.restore();
            });
        }

        window.spinWheel = async () => {
            if (isSpinning) return;
            isSpinning = true;
            const wheel = document.getElementById("lucky-wheel-canvas");
            const randomDeg = Math.floor(Math.random() * 360);
            const totalDeg = 1800 + randomDeg; // 5 teljes kör + random
            
            wheel.style.transform = `rotate(${totalDeg}deg)`;

            setTimeout(async () => {
                isSpinning = false;
                const actualDeg = 360 - (randomDeg % 360);
                const prizeIndex = Math.floor(actualDeg / (360 / PRIZES.length)) % PRIZES.length;
                const prize = PRIZES[prizeIndex];

                const userRef = doc(db, "users", currentUser.uid);
                let update = {};
                if(prize.type === 'gold') update.gold = increment(prize.val);
                else if(prize.type === 'hp') update.bonusHP = increment(prize.val);
                else if(prize.type === 'atk') update.bonusATK = increment(prize.val);

                await updateDoc(userRef, update);
                document.getElementById("wheel-result").innerText = "Nyertél: " + prize.label;
            }, 5000);
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById("auth-box").classList.add("hidden");
                document.getElementById("sidebar").classList.remove("hidden");
                document.getElementById("logout-ui").classList.remove("hidden");
                drawWheel();
                showSection('wheel-ui');
            }
        });

        window.showSection = (id) => {
            document.querySelectorAll('.game-container').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };
    </script>
</body>
</html>
