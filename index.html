<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szerencse RPG - Hősök Hajnala</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0f0f0f; 
            color: white; 
            display: flex; 
            margin: 0; 
            height: 100vh;
            overflow: hidden;
        }
        
        /* Oldalsáv stílusa */
        .sidebar {
            width: 80px;
            background: #1a1a1a;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 20px;
            transition: width 0.3s;
        }
        .sidebar:hover { width: 100px; } /* Kicsit kitágul, ha fölé viszed az egeret */

        .side-btn {
            width: 50px;
            height: 50px;
            background: #333;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: 0.3s;
            border: 1px solid #444;
        }
        .side-btn:hover { background: gold; color: black; transform: scale(1.1); }

        /* Központi tartalom */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .auth-container, .game-container { 
            background: #1e1e1e; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.7); 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
        }

        /* Karakter kártyák a választóhoz */
        .class-selector { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .class-card { 
            border: 2px solid #444; padding: 10px; border-radius: 12px; 
            cursor: pointer; transition: 0.3s; width: 90px; background: #252525;
        }
        .class-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; }

        /* Hős megjelenítése */
        #active-char-img { 
            max-width: 300px; border-radius: 20px; 
            border: 3px solid gold; box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .hidden { display: none !important; }
        input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #333; color: white; }
        .primary-btn { width: 85%; padding: 14px; background: gold; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="sidebar" class="sidebar hidden">
        <div class="side-btn" title="Karakter" onclick="showSection('game-ui')">👤</div>
        <div class="side-btn" title="Szerencsekerék" onclick="alert('Szerencsekerék hamarosan!')">🎡</div>
        <div class="side-btn" title="Bolt" onclick="alert('Bolt hamarosan!')">💰</div>
        <div style="margin-top: auto;" class="side-btn" title="Kijelentkezés" onclick="logout()">🚪</div>
    </div>

    <div class="main-content">
        
        <div class="auth-container" id="auth-box">
            <h2 id="auth-title">Bejelentkezés</h2>
            <input type="email" id="email" placeholder="E-mail cím">
            <input type="password" id="password" placeholder="Jelszó">
            <button class="primary-btn" id="auth-btn">Belépés</button>
            <p onclick="toggleAuth()" style="cursor:pointer; font-size: 0.8em; color: gold; margin-top:15px;">Regisztráció / Belépés váltás</p>
        </div>

        <div class="game-container hidden" id="selector-box">
            <h2>Válassz Hőst!</h2>
            <div class="class-selector">
                <div class="class-card" onclick="chooseClass('Warrior', 'warrior.jpg')">
                    <img src="warrior.jpg"><span>Warrior</span>
                </div>
                <div class="class-card" onclick="chooseClass('Mage', 'mage.jpg')">
                    <img src="mage.jpg"><span>Mage</span>
                </div>
                <div class="class-card" onclick="chooseClass('Scout', 'scout.jpg')">
                    <img src="scout.jpg"><span>Scout</span>
                </div>
            </div>
        </div>

        <div class="game-container hidden" id="game-ui">
            <h2 id="char-name-display">Hősöd</h2>
            <img id="active-char-img" src="">
            <div id="stats" style="margin-top: 15px; font-weight: bold; color: gold;">
                <span id="stat-hp"></span> | <span id="stat-atk"></span>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAfEx0o1BDUjMiD6plcBGxrBh_n_bUHlI8",
            authDomain: "porgetosjatek.firebaseapp.com",
            projectId: "porgetosjatek",
            storageBucket: "porgetosjatek.firebasestorage.app",
            messagingSenderId: "460225202442",
            appId: "1:460225202442:web:701d5416bd407aa97d92f3",
            measurementId: "G-89RDPJFLFC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- AUTH LOGIKA ---
        let isLogin = true;
        window.toggleAuth = () => {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "Bejelentkezés" : "Regisztráció";
            document.getElementById('auth-btn').innerText = isLogin ? "Belépés" : "Regisztráció";
        };

        document.getElementById('auth-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                if (isLogin) await signInWithEmailAndPassword(auth, email, password);
                else await createUserWithEmailAndPassword(auth, email, password);
            } catch (e) { alert("Hiba: " + e.message); }
        };

        // Javított figyelő: csak akkor vált, ha van felhasználó
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('selector-box').classList.remove('hidden');
            } else {
                document.getElementById('auth-box').classList.remove('hidden');
                document.getElementById('sidebar').classList.add('hidden');
                document.getElementById('selector-box').classList.add('hidden');
                document.getElementById('game-ui').classList.add('hidden');
            }
        });

        window.logout = () => signOut(auth).then(() => location.reload());

        // --- JÁTÉK LOGIKA ---
        window.chooseClass = (name, imgSrc) => {
            document.getElementById('selector-box').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('char-name-display').innerText = name;
            document.getElementById('active-char-img').src = imgSrc;
            
            const stats = { 'Warrior': ['❤️ 150', '⚔️ 15'], 'Mage': ['❤️ 80', '⚔️ 35'], 'Scout': ['❤️ 110', '⚔️ 25'] };
            document.getElementById('stat-hp').innerText = stats[name][0];
            document.getElementById('stat-atk').innerText = stats[name][1];
        };

        window.showSection = (id) => {
            document.getElementById('selector-box').classList.add('hidden');
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        };
    </script>
</body>
</html>
