<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szerencse RPG - Hősök Hajnala</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        
        /* Oldalsáv mobil optimalizálva */
        .sidebar { width: 60px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 15px; z-index: 10; }
        .side-btn { width: 40px; height: 40px; background: #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; transition: 0.3s; border: 1px solid #444; }

        .logout-btn { position: fixed; top: 15px; right: 15px; width: 40px; height: 40px; background: rgba(255, 215, 0, 0.1); border: 2px solid gold; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; z-index: 100; }

        .main-content { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 10px; }

        /* JAVÍTOTT KONTÉNER ELRENDEZÉS */
        .game-container { 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 25px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            width: 100%;
            max-width: 350px; /* Mobilbarát szélesség */
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #333;
        }
        
        /* Karakter név és infó gomb fent */
        .char-header { 
            margin-bottom: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            width: 100%;
        }
        .char-name { 
            font-size: 1.8em; 
            color: gold; 
            text-transform: uppercase; 
            font-weight: 800; 
            margin: 0;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        /* Megfelelő méretű kép mobilra is */
        #active-char-img { 
            width: 100%; 
            aspect-ratio: 2/3; /* Megtartja az RPG karakterek arányát */
            object-fit: cover;
            border-radius: 15px; 
            border: 2px solid gold; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            animation: float 4s ease-in-out infinite;
        }
        
        /* Statisztikák lent */
        .stat-box { 
            display: flex; 
            gap: 15px; 
            background: #111; 
            padding: 10px 20px; 
            border-radius: 30px; 
            border: 1px solid gold; 
            margin-top: 20px; 
            font-weight: bold;
            font-size: 0.9em;
        }
        
        .info-trigger { 
            background: gold; 
            color: black; 
            border-radius: 50%; 
            width: 24px; 
            height: 24px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 14px; 
            margin-left: 10px; 
            border: none;
        }

        /* MODAL (Hogy olvasható legyen a szöveg) */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; padding: 20px; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: #1a1a1a; border: 2px solid gold; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        .modal-content p { line-height: 1.6; color: #eee; font-style: italic; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .hidden { display: none !important; }
        .primary-btn { width: 100%; padding: 12px; background: gold; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="info-modal" class="modal-overlay" onclick="closeInfo()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="modal-title" style="color: gold;">-</h3>
            <p id="modal-text">-</p>
            <button class="primary-btn" onclick="closeInfo()">Vissza a harchoz</button>
        </div>
    </div>

    <div id="logout-ui" class="logout-btn hidden" onclick="logout()">🚪</div>

    <div id="sidebar" class="sidebar hidden">
        <div class="side-btn" onclick="showSection('game-ui')">👤</div>
        <div class="side-btn" onclick="alert('Pörgetés hamarosan!')">🎡</div>
    </div>

    <div class="main-content">
        <div class="game-container hidden" id="game-ui">
            <div class="char-header">
                <span class="char-name" id="char-name-display">MAGE</span>
                <button class="info-trigger" onclick="openInfo()">i</button>
            </div>
            
            <img id="active-char-img" src="" alt="Hősöd">
            
            <div class="stat-box">
                <span style="color: #ff4d4d;" id="stat-hp">❤️ HP: 0</span>
                <span style="color: #444;">|</span>
                <span style="color: gold;" id="stat-atk">⚔️ ATK: 0</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ... (Config marad a régi) ...
        const firebaseConfig = { apiKey: "AIzaSyAfEx0o1BDUjMiD6plcBGxrBh_n_bUHlI8", authDomain: "porgetosjatek.firebaseapp.com", projectId: "porgetosjatek", storageBucket: "porgetosjatek.firebasestorage.app", appId: "1:460225202442:web:701d5416bd407aa97d92f3" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const HERO_DATA = {
            'Warrior': { img: 'warrior.jpg', hp: 150, atk: 15, info: "„Az acél és a becsület az utad.” Rendíthetetlen védelmednek köszönhetően gyorsabban regenerálódsz, és a Kazamaták mélyén is kevesebbet kell pihenned." },
            'Mage': { img: 'mage.jpg', hp: 80, atk: 35, info: "„A mágia hatalom.” Bár tested törékeny, pusztító varázslataid nem ismernek kegyelmet. Minden nap +1 ingyen pörgetést kapsz!" },
            'Scout': { img: 'scout.jpg', hp: 110, atk: 25, info: "„Az árnyék a szövetségesed.” Gyorsaságod legendás; mindig az árnyak közül csapsz le, így dupla sebzéssel indítasz." }
        };

        let selectedClassName = "";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('logout-ui').classList.remove('hidden');
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) loadCharacter(docSnap.data().className);
            }
        });

        function loadCharacter(className) {
            selectedClassName = className;
            const char = HERO_DATA[className];
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('char-name-display').innerText = className;
            document.getElementById('active-char-img').src = char.img;
            document.getElementById('stat-hp').innerText = `❤️ ${char.hp}`;
            document.getElementById('stat-atk').innerText = `⚔️ ${char.atk}`;
        }

        window.openInfo = () => {
            const char = HERO_DATA[selectedClassName];
            document.getElementById('modal-title').innerText = selectedClassName + " Legendája";
            document.getElementById('modal-text').innerText = char.info;
            document.getElementById('info-modal').classList.add('active');
        };

        window.closeInfo = () => document.getElementById('info-modal').classList.remove('active');
        // JAVÍTOTT KIJELENTKEZÉS
window.logout = () => {
    signOut(auth)
        .then(() => {
            // Töröljük a helyi tárolót is, hogy biztosan ne maradjon beragadva adat
            localStorage.clear();
            sessionStorage.clear();
            
            // Teljes újratöltés kényszerítése a szerverről (true paraméterrel)
            window.location.replace(window.location.pathname);
        })
        .catch((error) => {
            console.error("Hiba a kijelentkezéskor:", error);
        });
};

// JAVÍTOTT ÁLLAPOTFIGYELŐ
onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUser = user;
        document.getElementById('sidebar').classList.remove('hidden');
        document.getElementById('logout-ui').classList.remove('hidden');
        document.getElementById('auth-box').classList.add('hidden'); // Rejtsük el az auth-ot biztosan
        
        const docSnap = await getDoc(doc(db, "users", user.uid));
        if (docSnap.exists()) {
            loadCharacter(docSnap.data().className);
        } else {
            renderSelectionMenu();
            document.getElementById('selector-box').classList.remove('hidden');
        }
    } else {
        // Ha NINCS felhasználó, mindent rejtsünk el és CSAK a bejelentkezést mutassuk
        currentUser = null;
        document.getElementById('sidebar').classList.add('hidden');
        document.getElementById('logout-ui').classList.add('hidden');
        document.getElementById('game-ui').classList.add('hidden');
        document.getElementById('selector-box').classList.add('hidden');
        document.getElementById('auth-box').classList.remove('hidden');
    }
});
        
    </script>
</body>
</html>
