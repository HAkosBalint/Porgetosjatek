<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hősök Hajnala RPG</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 70px; background: #111; display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 20px; border-right: 1px solid #333; z-index: 100; }
        .side-btn { width: 50px; height: 50px; background: #222; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border: 1px solid #444; }
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .game-container { background: #1a1a1a; padding: 20px; width: 95%; max-width: 450px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow-y: auto; max-height: 90vh; }
        
        /* Karakter Választó Kártyák */
        .class-selector { display: flex; gap: 8px; margin: 15px 0; width: 100%; }
        .class-card { 
            flex: 1; background: #222; border: 2px solid #444; border-radius: 10px; padding: 8px; 
            text-align: center; cursor: pointer; transition: 0.3s;
        }
        .class-card img { width: 100%; border-radius: 5px; margin-bottom: 5px; aspect-ratio: 2/3; object-fit: cover; background: #333; }
        .class-card.active { border-color: gold; background: #332b00; transform: scale(1.05); }
        .class-card h4 { margin: 5px 0; color: gold; font-size: 14px; }
        .class-card p { margin: 0; font-size: 10px; color: #bbb; line-height: 1.2; height: 35px; overflow: hidden; }
        .class-card small { display: block; margin-top: 5px; color: #ffd700; font-weight: bold; font-size: 10px; }

        .stat-box { display: flex; width: 100%; justify-content: space-around; background: #111; padding: 12px; border-radius: 15px; border: 1px solid gold; font-weight: bold; }
        .primary-btn { width: 100%; padding: 15px; background: gold; border: none; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; color: black; }
        .secondary-btn { background: transparent; color: gold; border: none; margin-top: 10px; cursor: pointer; text-decoration: underline; }
        .hidden { display: none !important; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #333; color: white; }

        /* Modal / Error */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: #1a1a1a; border: 2px solid #ff4d4d; padding: 25px; border-radius: 15px; max-width: 300px; text-align: center; box-shadow: 0 0 20px rgba(255, 77, 77, 0.4); }
        
        #active-char-img { width: 100%; max-width: 280px; aspect-ratio: 2/3; object-fit: cover; border-radius: 15px; border: 3px solid gold; margin: 15px 0; }
    </style>
</head>
<body>

    <div id="error-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 id="error-title" style="color: #ff4d4d; margin-top: 0;">Rendszerhiba!</h3>
            <p id="error-message" style="color: #ccc; font-size: 14px;"></p>
            <button class="primary-btn" style="background: #ff4d4d; color: white;" onclick="closeError()">Értem</button>
        </div>
    </div>

    <div id="sidebar" class="sidebar hidden">
        <div class="side-btn" onclick="showSection('game-ui')">👤</div>
        <div class="side-btn" onclick="showSection('wheel-ui')">🎡</div>
        <div class="side-btn" style="margin-top: auto; margin-bottom: 20px;" onclick="logout()">🚪</div>
    </div>

    <div class="main-content">
        <div class="game-container" id="auth-box">
            <h2 id="auth-title" style="color: gold; margin-bottom: 10px;">Bejelentkezés</h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="password" placeholder="Jelszó">
            
            <div id="class-selection-area" class="hidden" style="width: 100%;">
                <p style="text-align: center; color: gold; margin: 15px 0 5px 0; font-weight: bold;">VÁLASSZ KASZTOT</p>
                <div class="class-selector">
                    <div class="class-card active" onclick="selectClass('warrior', this)">
                        <img src="warrior.jpg" alt="Warrior">
                        <h4>Warrior</h4>
                        <p>Hatalmas életerő és acélos védelem.</p>
                        <small>HP: 150 | ATK: 8</small>
                    </div>
                    <div class="class-card" onclick="selectClass('mage', this)">
                        <img src="mage.jpg" alt="Mage">
                        <h4>Mage</h4>
                        <p>Törékeny test, de pusztító mágia.</p>
                        <small>HP: 80 | ATK: 15</small>
                    </div>
                    <div class="class-card" onclick="selectClass('scout', this)">
                        <img src="scout.jpg" alt="Scout">
                        <h4>Scout</h4>
                        <p>Gyorsaság és pontos találatok.</p>
                        <small>HP: 110 | ATK: 11</small>
                    </div>
                </div>
            </div>

            <button class="primary-btn" id="auth-btn">Belépés</button>
            <button class="secondary-btn" id="toggle-auth">Még nincs fiókom: Regisztráció</button>
        </div>

        <div class="game-container hidden" id="game-ui">
            <h2 id="char-name-display" style="color: gold; margin: 5px; text-transform: capitalize;">-</h2>
            <img id="active-char-img" src="" alt="Karakter">
            <div class="stat-box">
                <span id="stat-hp" style="color: #ff4d4d;">❤️ 0</span>
                <span id="stat-atk" style="color: gold;">⚔️ 0</span>
                <span id="stat-gold" style="color: #ffd700;">💰 0</span>
            </div>
        </div>

        <div class="game-container hidden" id="wheel-ui">
            <h2 style="color: gold; margin: 0;">Szerencsekerék</h2>
            <p id="wheel-result" style="color: white; font-size: 14px; min-height: 1.5em; margin: 10px 0;">Pörgess a bónuszokért!</p>
            <canvas id="lucky-wheel-canvas" width="500" height="500" style="width: 280px; height: 280px;"></canvas>
            <button class="primary-btn" onclick="spinWheel()">Pörgetés!</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAfEx0o1BDUjMiD6plcBGxrBh_n_bUHlI8", authDomain: "porgetosjatek.firebaseapp.com", projectId: "porgetosjatek", storageBucket: "porgetosjatek.firebasestorage.app", appId: "1:460225202442:web:701d5416bd407aa97d92f3" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let selectedClassName = "warrior";
        let isLoginMode = true;
        let currentUser = null;

        window.selectClass = (name, element) => {
            selectedClassName = name;
            document.querySelectorAll('.class-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
        };

        window.showError = (msg) => {
            document.getElementById('error-message').innerText = msg;
            document.getElementById('error-modal').classList.remove('hidden');
        };
        window.closeError = () => document.getElementById('error-modal').classList.add('hidden');

        document.getElementById('toggle-auth').onclick = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Bejelentkezés" : "Regisztráció";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Belépés" : "Hős Létrehozása";
            document.getElementById('class-selection-area').classList.toggle('hidden', isLoginMode);
            document.getElementById('toggle-auth').innerText = isLoginMode ? "Még nincs fiókom: Regisztráció" : "Már van fiókom: Bejelentkezés";
        };

        document.getElementById('auth-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return showError("Kérlek, töltsd ki az összes mezőt!");

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    const res = await createUserWithEmailAndPassword(auth, email, password);
                    let startHP = 100, startATK = 10;
                    if(selectedClassName === "warrior") { startHP = 150; startATK = 8; }
                    else if(selectedClassName === "mage") { startHP = 80; startATK = 15; }
                    else if(selectedClassName === "scout") { startHP = 110; startATK = 11; }

                    await setDoc(doc(db, "users", res.user.uid), {
                        className: selectedClassName,
                        baseHP: startHP,
                        baseATK: startATK,
                        bonusHP: 0,
                        bonusATK: 0,
                        gold: 100
                    });
                }
            } catch (e) {
                let m = "Hiba történt!";
                if(e.code === 'auth/invalid-credential') m = "Hibás e-mail vagy jelszó!";
                if(e.code === 'auth/email-already-in-use') m = "Ez az e-mail már használatban van!";
                if(e.code === 'auth/weak-password') m = "A jelszó túl gyenge (min. 6 karakter)!";
                showError(m);
            }
        };

        async function updateUI() {
            if(!currentUser) return;
            const snap = await getDoc(doc(db, "users", currentUser.uid));
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('char-name-display').innerText = d.className;
                document.getElementById('active-char-img').src = d.className + ".jpg";
                document.getElementById('stat-hp').innerText = `❤️ ${d.baseHP + (d.bonusHP || 0)}`;
                document.getElementById('stat-atk').innerText = `⚔️ ${d.baseATK + (d.bonusATK || 0)}`;
                document.getElementById('stat-gold').innerText = `💰 ${d.gold || 0}`;
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('sidebar').classList.remove('hidden');
                updateUI();
                showSection('game-ui');
            }
        });

        window.showSection = (id) => {
            document.querySelectorAll('.game-container').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
