<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szerencse RPG - Karakterválasztó</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .auth-container, .game-container { background: #2c2c2c; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 350px; text-align: center; transition: 0.5s; }
        h2 { color: gold; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; background: #444; color: white; }
        button { width: 100%; padding: 12px; margin-top: 15px; border-radius: 5px; border: none; background: gold; color: #1a1a1a; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #ffd700; transform: scale(1.05); }
        
        /* Karakter választó stílusa */
        .class-selector { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        .class-card { border: 2px solid #555; padding: 15px; border-radius: 10px; cursor: pointer; transition: 0.3s; width: 80px; text-align: center; }
        .class-card:hover { border-color: gold; background: #3d3d3d; transform: translateY(-5px); }
        .class-card img { width: 50px; height: 50px; display: block; margin: 0 auto 10px; }
        .class-card span { font-size: 0.8em; font-weight: bold; }

        /* Megjelenített karakter a közepén */
        #active-char { font-size: 5em; margin: 20px 0; display: block; animation: float 2s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .hidden { display: none; }
        .toggle-link { margin-top: 15px; font-size: 0.8em; color: #bbb; cursor: pointer; }
    </style>
</head>
<body>

    <div class="auth-container" id="auth-box">
        <h2 id="auth-title">Bejelentkezés</h2>
        <input type="email" id="email" placeholder="E-mail cím">
        <input type="password" id="password" placeholder="Jelszó">
        <button id="auth-btn">Belépés</button>
        <div class="toggle-link" id="toggle-auth">Nincs fiókod? <b>Regisztráció</b></div>
    </div>

    <div class="game-container hidden" id="selector-box">
        <h2>Válassz Hőst!</h2>
        <div class="class-selector">
            <div class="class-card" onclick="chooseClass('Warrior', '⚔️')">
                <div style="font-size: 30px;">⚔️</div>
                <span>Warrior</span>
            </div>
            <div class="class-card" onclick="chooseClass('Mage', '🪄')">
                <div style="font-size: 30px;">🪄</div>
                <span>Mage</span>
            </div>
            <div class="class-card" onclick="chooseClass('Scout', '🏹')">
                <div style="font-size: 30px;">🏹</div>
                <span>Scout</span>
            </div>
        </div>
    </div>

    <div class="game-container hidden" id="game-ui">
        <h2 id="char-name-display">Hősöd</h2>
        <div id="active-char"></div>
        <p>Készen állsz a kalandra?</p>
        <button onclick="location.reload()" style="background: #ff4444; color: white;">Kijelentkezés</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAfEx0o1BDUjMiD6plcBGxrBh_n_bUHlI8",
            authDomain: "porgetosjatek.firebaseapp.com",
            projectId: "porgetosjatek",
            storageBucket: "porgetosjatek.firebasestorage.app",
            messagingSenderId: "460225202442",
            appId: "1:460225202442:web:701d5416bd407aa97d92f3",
            measurementId: "G-89RDPJFLFC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- AUTH LOGIKA ---
        let isLogin = true;
        document.getElementById('toggle-auth').onclick = () => {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "Bejelentkezés" : "Regisztráció";
            document.getElementById('auth-btn').innerText = isLogin ? "Belépés" : "Regisztráció";
        };

        document.getElementById('auth-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                if (isLogin) await signInWithEmailAndPassword(auth, email, password);
                else await createUserWithEmailAndPassword(auth, email, password);
            } catch (e) { alert("Hiba: " + e.message); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('selector-box').classList.remove('hidden');
            }
        });

        // --- JÁTÉK LOGIKA ---
        window.chooseClass = (name, icon) => {
            document.getElementById('selector-box').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('char-name-display').innerText = name;
            document.getElementById('active-char').innerText = icon;
        };
    </script>
</body>
</html>
