<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szerencse RPG - Hősök Hajnala</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        
        /* Oldalsáv */
        .sidebar { width: 60px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 15px; z-index: 10; }
        .side-btn { width: 45px; height: 45px; background: #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 22px; transition: 0.3s; border: 1px solid #444; }
        .side-btn:hover { background: gold; color: black; }

        .logout-btn { position: fixed; top: 15px; right: 15px; width: 45px; height: 45px; background: rgba(255, 215, 0, 0.1); border: 2px solid gold; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 22px; z-index: 100; }

        .main-content { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 10px; position: relative; }

        .game-container { 
            background: #1e1e1e; 
            padding: 25px; 
            border-radius: 25px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            width: 100%;
            max-width: 360px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #333;
            text-align: center;
        }

        /* Karakter fejléc */
        .char-header { margin-bottom: 15px; display: flex; align-items: center; justify-content: center; width: 100%; }
        .char-name { font-size: 1.8em; color: gold; text-transform: uppercase; font-weight: 800; margin: 0; }

        #active-char-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 15px; border: 2px solid gold; animation: float 4s ease-in-out infinite; }
        
        .stat-box { display: flex; gap: 10px; background: #111; padding: 10px 15px; border-radius: 30px; border: 1px solid gold; margin-top: 15px; font-weight: bold; font-size: 0.85em; }
        
        /* SZERENCSEKERÉK FIXÁLÁSA */
        .wheel-wrapper { 
            position: relative; 
            width: 280px;  /* Fix szélesség */
            height: 280px; /* Fix magasság - NINCS ELDEFORMÁLÓDÁS */
            margin: 15px auto;
            border-radius: 50%;
            overflow: hidden;
        }
        
        #lucky-wheel-container {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        #lucky-wheel { width: 100%; height: 100%; object-fit: cover; }

        .wheel-pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); font-size: 35px; color: gold; z-index: 20; text-shadow: 0 0 10px black; }

        /* Szelet feliratok */
        .wheel-prize-label {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 130px;
            transform-origin: 0% 0%;
            text-align: right;
            color: white;
            font-size: 10px;
            font-weight: bold;
            text-shadow: 2px 2px 4px black;
            white-space: nowrap;
            z-index: 10;
            padding-right: 15px;
            pointer-events: none;
        }

        .info-trigger { background: gold; color: black; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; margin-left: 10px; border: none; }

        /* Modal */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.92); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: #1a1a1a; border: 2px solid gold; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .hidden { display: none !important; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #333; color: white; }
        .primary-btn { width: 100%; padding: 14px; background: gold; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .primary-btn:disabled { background: #555; }
    </style>
</head>
<body>

    <div id="info-modal" class="modal-overlay" onclick="closeInfo()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="modal-title" style="color: gold;">-</h3>
            <p id="modal-text" style="color: #eee; font-style: italic;"></p>
            <button class="primary-btn" onclick="closeInfo()">Értem</button>
        </div>
    </div>

    <div id="logout-ui" class="logout-btn hidden" onclick="logout()">🚪</div>

    <div id="sidebar" class="sidebar hidden">
        <div class="side-btn" title="Karakter" onclick="showSection('game-ui')">👤</div>
        <div class="side-btn" title="Szerencsekerék" onclick="showSection('wheel-ui')">🎡</div>
    </div>

    <div class="main-content">
        <div class="game-container" id="auth-box">
            <h2 id="auth-title" style="color: gold;">Hősök Hajnala</h2>
            <input type="email" id="email" placeholder="E-mail cím">
            <input type="password" id="password" placeholder="Jelszó">
            <button class="primary-btn" id="auth-btn">Belépés</button>
            <p onclick="toggleAuth()" style="cursor:pointer; font-size: 0.8em; color: gold; margin-top:15px;">Fiók váltása</p>
        </div>

        <div class="game-container hidden" id="game-ui">
            <div class="char-header">
                <span class="char-name" id="char-name-display">-</span>
                <button class="info-trigger" onclick="openInfo()">i</button>
            </div>
            <img id="active-char-img" src="" alt="Hősöd">
            <div class="stat-box">
                <span style="color: #ff4d4d;" id="stat-hp">❤️ HP: 0</span>
                <span style="color: #444;">|</span>
                <span style="color: gold;" id="stat-atk">⚔️ ATK: 0</span>
                <span style="color: #444;">|</span>
                <span style="color: #ffd700;" id="stat-gold">💰 0</span>
            </div>
        </div>

        <div class="game-container hidden" id="wheel-ui">
            <h2 style="color: gold; margin-top: 0;">A Sors Kereke</h2>
            <div class="wheel-wrapper">
                <div class="wheel-pointer">▼</div>
                <div id="lucky-wheel-container">
                    <img id="lucky-wheel" src="luckywheel.png" alt="Szerencsekerék">
                    </div>
            </div>
            <button class="primary-btn" id="spin-btn" onclick="spinWheel()">Pörgetés!</button>
            <p id="wheel-result" style="margin-top: 15px; font-weight: bold; color: gold; min-height: 1.2em;"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAfEx0o1BDUjMiD6plcBGxrBh_n_bUHlI8", authDomain: "porgetosjatek.firebaseapp.com", projectId: "porgetosjatek", storageBucket: "porgetosjatek.firebasestorage.app", appId: "1:460225202442:web:701d5416bd407aa97d92f3" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const HERO_DATA = {
            'Warrior': { img: 'warrior.png', hp: 150, atk: 15, info: "Warrior: Rendíthetetlen védelem." },
            'Mage': { img: 'mage.png', hp: 80, atk: 35, info: "Mage: Törékeny, de nagy sebzés, minden nap +1 szerencsekerék pörgetés!" },
            'Scout': { img: 'scout.png', hp: 110, atk: 25, info: "Scout: Gyorsaság és lopakodás." }
        };

        const WHEEL_PRIZES = [
            { type: 'gold', value: 100, label: "100 Arany" }, { type: 'hp', value: 5, label: "+5 HP" },
            { type: 'gold', value: 20, label: "20 Arany" }, { type: 'atk', value: 2, label: "+2 ATK" },
            { type: 'gold', value: 200, label: "200 Arany" }, { type: 'hp', value: 10, label: "+10 HP" },
            { type: 'gold', value: 50, label: "50 Arany" }, { type: 'atk', value: 1, label: "+1 ATK" },
            { type: 'gold', value: 10, label: "10 Arany" }, { type: 'hp', value: 2, label: "+2 HP" },
            { type: 'gold', value: 500, label: "JACKPOT!" }, { type: 'atk', value: 5, label: "+5 ATK" }
        ];

        let currentUser = null, selectedClassName = "", isSpinning = false;

        function generateWheelLabels() {
            const container = document.getElementById('lucky-wheel-container');
            container.querySelectorAll('.wheel-prize-label').forEach(el => el.remove());
            WHEEL_PRIZES.forEach((p, i) => {
                const label = document.createElement('div');
                label.className = 'wheel-prize-label';
                label.style.transform = `translate(-50%, -50%) rotate(${(i * 30) + 15 - 90}deg) translate(25px, 0)`; 
                label.innerText = p.label;
                container.appendChild(label);
            });
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('logout-ui').classList.remove('hidden');
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    loadCharacter(snap.data().className, snap.data().gold || 0, snap.data().bonusHP || 0, snap.data().bonusATK || 0);
                    generateWheelLabels();
                    showSection('game-ui');
                }
            } else {
                document.getElementById('auth-box').classList.remove('hidden');
                document.getElementById('sidebar').classList.add('hidden');
            }
        });

        window.logout = () => signOut(auth).then(() => { localStorage.clear(); location.replace(location.pathname); });

        window.toggleAuth = () => {
            const t = document.getElementById('auth-title');
            t.innerText = t.innerText === "Hősök Hajnala" ? "Regisztráció" : "Hősök Hajnala";
        };

        document.getElementById('auth-btn').onclick = async () => {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            try {
                if (document.getElementById('auth-title').innerText === "Hősök Hajnala") await signInWithEmailAndPassword(auth, e, p);
                else await createUserWithEmailAndPassword(auth, e, p);
            } catch (err) { alert(err.message); }
        };

        function loadCharacter(className, gold, bonusHP = 0, bonusATK = 0) {
            selectedClassName = className;
            const char = HERO_DATA[className];
            document.getElementById('char-name-display').innerText = className;
            document.getElementById('active-char-img').src = char.img;
            document.getElementById('stat-hp').innerText = `❤️ HP: ${char.hp + bonusHP}`;
            document.getElementById('stat-atk').innerText = `⚔️ ATK: ${char.atk + bonusATK}`;
            document.getElementById('stat-gold').innerText = `💰 ${gold}`;
        }

        window.showSection = (id) => {
            document.querySelectorAll('.game-container').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        window.openInfo = () => {
            const char = HERO_DATA[selectedClassName];
            document.getElementById('modal-title').innerText = selectedClassName + " Képességei";
            document.getElementById('modal-text').innerText = char.info;
            document.getElementById('info-modal').classList.add('active');
        };
        window.closeInfo = () => document.getElementById('info-modal').classList.remove('active');

        window.spinWheel = async () => {
            if (isSpinning) return;
            isSpinning = true;
            const container = document.getElementById('lucky-wheel-container');
            const resultText = document.getElementById('wheel-result');
            document.getElementById('spin-btn').disabled = true;

            const extraDegrees = Math.floor(Math.random() * 360);
            const totalRotation = 1800 + extraDegrees;
            container.style.transform = `rotate(${totalRotation}deg)`;

            setTimeout(async () => {
                isSpinning = false;
                document.getElementById('spin-btn').disabled = false;
                const actualDegree = extraDegrees % 360;
                const prizeIndex = Math.floor((360 - actualDegree) / 30) % 12;
                const prize = WHEEL_PRIZES[prizeIndex];

                const userRef = doc(db, "users", currentUser.uid);
                let updateData = {};
                if (prize.type === 'gold') updateData.gold = increment(prize.value);
                else if (prize.type === 'hp') updateData.bonusHP = increment(prize.value);
                else if (prize.type === 'atk') updateData.bonusATK = increment(prize.value);
                
                await updateDoc(userRef, updateData);
                const snap = await getDoc(userRef);
                const d = snap.data();
                loadCharacter(d.className, d.gold || 0, d.bonusHP || 0, d.bonusATK || 0);
                resultText.innerText = `Nyeremény: ${prize.label}!`;

                setTimeout(() => {
                    container.style.transition = "none";
                    container.style.transform = `rotate(${actualDegree}deg)`;
                    setTimeout(() => container.style.transition = "transform 5s cubic-bezier(0.15, 0, 0.15, 1)", 50);
                }, 500);
            }, 5000);
        };
    </script>
</body>
</html>
