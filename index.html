<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szerencse RPG - Hősök Hajnala</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        
        /* Oldalsáv */
        .sidebar { width: 80px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 20px; z-index: 10; }
        .side-btn { width: 50px; height: 50px; background: #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; transition: 0.3s; border: 1px solid #444; }
        .side-btn:hover { background: gold; color: black; transform: scale(1.1); }

        /* Kijelentkezés gomb jobb felül */
        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: rgba(255, 68, 68, 0.2);
            border: 2px solid #ff4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            color: #ff4444;
            transition: 0.3s;
            z-index: 100;
        }
        .logout-btn:hover { background: #ff4444; color: white; box-shadow: 0 0 15px #ff4444; transform: rotate(90deg); }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        .auth-container, .game-container { background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.7); width: 90%; max-width: 400px; text-align: center; }
        
        /* Karakter választó */
        .class-selector { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .class-card { border: 2px solid #444; padding: 10px; border-radius: 12px; cursor: pointer; transition: 0.3s; width: 90px; background: #252525; }
        .class-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; }
        
        /* Hős kép */
        #active-char-img { max-width: 300px; border-radius: 20px; border: 3px solid gold; box-shadow: 0 0 40px rgba(255, 215, 0, 0.2); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        .hidden { display: none !important; }
        input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #333; color: white; }
        .primary-btn { width: 85%; padding: 14px; background: gold; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="logout-ui" class="logout-btn hidden" title="Kijelentkezés" onclick="logout()">
        ⏻
    </div>

    <div id="sidebar" class="sidebar hidden">
        <div class="side-btn" title="Karakter" onclick="showSection('game-ui')">👤</div>
        <div class="side-btn" title="Szerencsekerék" onclick="alert('Hamarosan!')">🎡</div>
        <div class="side-btn" title="Bolt" onclick="alert('Hamarosan!')">💰</div>
    </div>

    <div class="main-content">
        <div class="auth-container" id="auth-box">
            <h2 id="auth-title">Bejelentkezés</h2>
            <input type="email" id="email" placeholder="E-mail cím">
            <input type="password" id="password" placeholder="Jelszó">
            <button class="primary-btn" id="auth-btn">Belépés</button>
            <p onclick="toggleAuth()" style="cursor:pointer; font-size: 0.8em; color: gold; margin-top:15px;">Regisztráció / Belépés váltás</p>
        </div>

        <div class="game-container hidden" id="selector-box">
            <h2>Válassz Hőst!</h2>
            <p style="font-size: 0.7em; color: gray;">Figyelem: Ezt a döntést nem tudod megváltoztatni!</p>
            <div class="class-selector">
                <div class="class-card" onclick="saveAndChoose('Warrior', 'warrior.jpg')">
                    <img src="warrior.jpg"><span>Warrior</span>
                </div>
                <div class="class-card" onclick="saveAndChoose('Mage', 'mage.jpg')">
                    <img src="mage.jpg"><span>Mage</span>
                </div>
                <div class="class-card" onclick="saveAndChoose('Scout', 'scout.jpg')">
                    <img src="scout.jpg"><span>Scout</span>
                </div>
            </div>
        </div>

        <div class="game-container hidden" id="game-ui">
            <h2 id="char-name-display">Hősöd</h2>
            <img id="active-char-img" src="">
            <div id="stats" style="margin-top: 15px; font-weight: bold; color: gold;">
                <span id="stat-hp"></span> | <span id="stat-atk"></span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAfEx0o1BDUjMiD6plcBGxrBh_n_bUHlI8",
            authDomain: "porgetosjatek.firebaseapp.com",
            projectId: "porgetosjatek",
            storageBucket: "porgetosjatek.firebasestorage.app",
            messagingSenderId: "460225202442",
            appId: "1:460225202442:web:701d5416bd407aa97d92f3",
            measurementId: "G-89RDPJFLFC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // --- AUTH ---
        window.toggleAuth = () => {
            const t = document.getElementById('auth-title');
            const b = document.getElementById('auth-btn');
            if(t.innerText === "Bejelentkezés") { t.innerText = "Regisztráció"; b.innerText = "Regisztráció"; }
            else { t.innerText = "Bejelentkezés"; b.innerText = "Belépés"; }
        };

        document.getElementById('auth-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                if (document.getElementById('auth-btn').innerText === "Belépés") await signInWithEmailAndPassword(auth, email, password);
                else await createUserWithEmailAndPassword(auth, email, password);
            } catch (e) { alert("Hiba: " + e.message); }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('logout-ui').classList.remove('hidden');
                
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    loadCharacter(docSnap.data().className, docSnap.data().img);
                } else {
                    document.getElementById('selector-box').classList.remove('hidden');
                }
            } else {
                document.getElementById('logout-ui').classList.add('hidden');
                document.getElementById('sidebar').classList.add('hidden');
            }
        });

        window.logout = () => signOut(auth).then(() => location.reload());

        // --- JÁTÉK ---
        window.saveAndChoose = async (name, img) => {
            if(!currentUser) return;
            await setDoc(doc(db, "users", currentUser.uid), {
                className: name,
                img: img,
                gold: 0,
                level: 1
            });
            loadCharacter(name, img);
        };

        function loadCharacter(name, imgSrc) {
            document.getElementById('selector-box').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('char-name-display').innerText = name;
            document.getElementById('active-char-img').src = imgSrc;
            
            const stats = { 'Warrior': ['❤️ 150', '⚔️ 15'], 'Mage': ['❤️ 80', '⚔️ 35'], 'Scout': ['❤️ 110', '⚔️ 25'] };
            document.getElementById('stat-hp').innerText = stats[name][0];
            document.getElementById('stat-atk').innerText = stats[name][1];
        }

        window.showSection = (id) => {
            document.getElementById('selector-box').classList.add('hidden');
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        };
    </script>
</body>
</html>
