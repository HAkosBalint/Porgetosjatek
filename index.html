<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hősök Hajnala RPG</title>
    <style>
        /* TELJES KIJELZŐS ELRENDEZÉS */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #000; 
            color: white; 
            margin: 0; 
            padding: 0;
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            overflow: hidden;
        }

        .main-content { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 10px;
        }

        .game-container { 
            background: #1a1a1a; 
            padding: 20px; 
            width: 95%; 
            max-width: 400px; 
            border-radius: 20px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            border: 1px solid #333;
            box-sizing: border-box;
        }

        /* KARAKTER PROFIL JAVÍTÁSA */
        #active-char-img { 
            width: 100%; 
            max-width: 280px; 
            height: auto;
            aspect-ratio: 2/3; 
            object-fit: cover; 
            border-radius: 15px; 
            border: 3px solid gold; 
            margin: 15px 0;
            display: block; /* Biztosítja a megjelenést */
        }

        .char-name { font-size: 2em; color: gold; margin: 5px 0; font-weight: bold; }

        /* SZERENCSEKERÉK NAGYÍTÁSA */
        .wheel-wrapper { 
            position: relative; 
            width: 300px; 
            height: 300px; 
            margin: 15px auto; 
        }

        #lucky-wheel-canvas { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            border: 5px solid gold; 
            transition: transform 5s cubic-bezier(0.1, 0, 0, 1);
        }

        .wheel-pointer { 
            position: absolute; 
            top: -15px; 
            left: 50%; 
            transform: translateX(-50%); 
            font-size: 40px; 
            color: gold; 
            z-index: 100; 
            text-shadow: 0 0 10px black;
        }

        /* STATISZTIKÁK */
        .stat-box { 
            display: flex; 
            width: 100%; 
            justify-content: space-around; 
            background: #111; 
            padding: 12px; 
            border-radius: 15px; 
            border: 1px solid gold; 
            font-weight: bold;
        }

        /* MENÜ ALUL */
        .sidebar { 
            height: 70px; 
            background: #111; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 50px; 
            border-top: 2px solid #333;
        }

        .side-btn { font-size: 30px; cursor: pointer; padding: 10px; }
        .primary-btn { width: 100%; padding: 15px; background: gold; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1em; margin-top: 15px; cursor: pointer; }
        .hidden { display: none !important; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #333; color: white; }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="game-container" id="auth-box">
            <h2 style="color: gold;">Bejelentkezés</h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="password" placeholder="Jelszó">
            <button class="primary-btn" id="auth-btn">Belépés</button>
        </div>

        <div class="game-container hidden" id="game-ui">
            <div class="char-name" id="char-name-display">-</div>
            <img id="active-char-img" src="warrior.png" alt="Karakter">
            <div class="stat-box">
                <span id="stat-hp" style="color: #ff4d4d;">❤️ 0</span>
                <span id="stat-atk" style="color: gold;">⚔️ 0</span>
                <span id="stat-gold" style="color: #ffd700;">💰 0</span>
            </div>
        </div>

        <div class="game-container hidden" id="wheel-ui">
            <h2 style="color: gold; margin: 0;">Szerencsekerék</h2>
            <div class="wheel-wrapper">
                <div class="wheel-pointer">▼</div>
                <canvas id="lucky-wheel-canvas" width="500" height="500"></canvas>
            </div>
            <button class="primary-btn" id="spin-btn" onclick="spinWheel()">Pörgetés!</button>
            <p id="wheel-result" style="color: gold; font-weight: bold; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="sidebar" class="sidebar hidden">
        <div class="side-btn" onclick="showSection('game-ui')">👤</div>
        <div class="side-btn" onclick="showSection('wheel-ui')">🎡</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAfEx0o1BDUjMiD6plcBGxrBh_n_bUHlI8", authDomain: "porgetosjatek.firebaseapp.com", projectId: "porgetosjatek", storageBucket: "porgetosjatek.firebasestorage.app", appId: "1:460225202442:web:701d5416bd407aa97d92f3" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const PRIZES = [
            { label: "100 Gold", color: "#1a1a1a", type: 'gold', val: 100 },
            { label: "+5 HP", color: "#2a2a2a", type: 'hp', val: 5 },
            { label: "20 Gold", color: "#1a1a1a", type: 'gold', val: 20 },
            { label: "+2 ATK", color: "#2a2a2a", type: 'atk', val: 2 },
            { label: "200 Gold", color: "#1a1a1a", type: 'gold', val: 200 },
            { label: "+10 HP", color: "#2a2a2a", type: 'hp', val: 10 },
            { label: "50 Gold", color: "#1a1a1a", type: 'gold', val: 50 },
            { label: "+1 ATK", color: "#2a2a2a", type: 'atk', val: 1 },
            { label: "10 Gold", color: "#1a1a1a", type: 'gold', val: 10 },
            { label: "+2 HP", color: "#2a2a2a", type: 'hp', val: 2 },
            { label: "JACKPOT", color: "#d4af37", type: 'gold', val: 500 },
            { label: "+5 ATK", color: "#2a2a2a", type: 'atk', val: 5 }
        ];

        let currentUser = null, currentRotation = 0, isSpinning = false;

        function drawWheel() {
            const canvas = document.getElementById("lucky-wheel-canvas");
            const ctx = canvas.getContext("2d");
            const centerX = 250, centerY = 250, radius = 240;
            const sliceAngle = (2 * Math.PI) / PRIZES.length;

            PRIZES.forEach((prize, i) => {
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.fillStyle = prize.color;
                ctx.fill();
                ctx.strokeStyle = "gold";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.fillStyle = "white";
                ctx.font = "bold 18px Arial";
                ctx.textAlign = "right";
                ctx.fillText(prize.label, radius - 20, 10);
                ctx.restore();
            });
        }

        window.spinWheel = async () => {
            if (isSpinning) return;
            isSpinning = true;
            const wheel = document.getElementById("lucky-wheel-canvas");
            const resultText = document.getElementById("wheel-result");

            const extraRotation = Math.floor(Math.random() * 360);
            currentRotation += 1800 + extraRotation; 
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(async () => {
                isSpinning = false;
                // MATEMATIKAI JAVÍTÁS
                // A mutató fentről (270 fok) nézi a szeletet
                const actualAngle = (currentRotation % 360);
                const prizeIndex = Math.floor(((360 - actualAngle) + 270) % 360 / (360 / PRIZES.length));
                const prize = PRIZES[prizeIndex];

                const userRef = doc(db, "users", currentUser.uid);
                await updateDoc(userRef, {
                    [prize.type === 'gold' ? 'gold' : prize.type === 'hp' ? 'bonusHP' : 'bonusATK']: increment(prize.val)
                });

                resultText.innerText = "Nyertél: " + prize.label;
                updateStats();
            }, 5000);
        };

        async function updateStats() {
            const snap = await getDoc(doc(db, "users", currentUser.uid));
            const data = snap.data();
            document.getElementById('stat-hp').innerText = `❤️ ${100 + (data.bonusHP || 0)}`;
            document.getElementById('stat-atk').innerText = `⚔️ ${10 + (data.bonusATK || 0)}`;
            document.getElementById('stat-gold').innerText = `💰 ${data.gold || 0}`;
            document.getElementById('char-name-display').innerText = data.className;
            document.getElementById('active-char-img').src = data.className.toLowerCase() + ".png";
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('sidebar').classList.remove('hidden');
                drawWheel();
                updateStats();
                showSection('game-ui');
            }
        });

        window.showSection = (id) => {
            document.querySelectorAll('.game-container').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        document.getElementById('auth-btn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
                .catch(err => alert("Hiba: " + err.message));
        };
    </script>
</body>
</html>
