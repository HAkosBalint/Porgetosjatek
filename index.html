<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hősök Hajnala RPG</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #000; 
            color: white; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        .sidebar { 
            width: 70px; 
            background: #111; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 20px; 
            gap: 20px; 
            border-right: 1px solid #333;
            z-index: 100;
        }

        .side-btn { 
            width: 50px; 
            height: 50px; 
            background: #222; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 24px; 
            cursor: pointer; 
            border: 1px solid #444;
        }

        .main-content { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
        }

        .game-container { 
            background: #1a1a1a; 
            padding: 20px; 
            width: 90%; 
            max-width: 380px; 
            border-radius: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #active-char-img { 
            width: 100%; 
            max-width: 280px; 
            aspect-ratio: 2/3; 
            object-fit: cover; 
            border-radius: 15px; 
            border: 3px solid gold; 
            margin: 15px 0;
            background: #222;
        }

        .stat-box { 
            display: flex; 
            width: 100%; 
            justify-content: space-around; 
            background: #111; 
            padding: 12px; 
            border-radius: 15px; 
            border: 1px solid gold; 
            font-weight: bold;
        }

        /* KERÉK STÍLUS */
        .wheel-wrapper { position: relative; width: 300px; height: 300px; margin: 15px 0; }
        #lucky-wheel-canvas { width: 100%; height: 100%; border-radius: 50%; border: 4px solid gold; transition: transform 5s cubic-bezier(0.1, 0, 0, 1); }
        .wheel-pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 40px; color: gold; z-index: 10; }

        .primary-btn { width: 100%; padding: 15px; background: gold; border: none; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; color: black; }
        .secondary-btn { background: transparent; color: gold; border: none; margin-top: 10px; cursor: pointer; text-decoration: underline; }
        
        .hidden { display: none !important; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #333; color: white; }

        /* EGYEDI MODAL / ERROR ABLAK */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .modal-box {
            background: #1a1a1a; border: 2px solid #ff4d4d; padding: 25px;
            border-radius: 15px; max-width: 300px; text-align: center;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.3);
        }
        .modal-box h3 { color: #ff4d4d; margin-top: 0; }
        .modal-box p { color: #ccc; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="error-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 id="error-title">Hiba történt!</h3>
            <p id="error-message">Ismeretlen hiba lépett fel a rendszerben.</p>
            <button class="primary-btn" style="background: #ff4d4d; color: white;" onclick="closeError()">Értem</button>
        </div>
    </div>

    <div id="sidebar" class="sidebar hidden">
        <div class="side-btn" onclick="showSection('game-ui')">👤</div>
        <div class="side-btn" onclick="showSection('wheel-ui')">🎡</div>
        <div class="side-btn" style="margin-top: auto; margin-bottom: 20px;" onclick="logout()">🚪</div>
    </div>

    <div class="main-content">
        <div class="game-container" id="auth-box">
            <h2 id="auth-title" style="color: gold;">Bejelentkezés</h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="password" placeholder="Jelszó">
            
            <input type="text" id="char-class" class="hidden" placeholder="Karakter neve (pl. Lovag)">

            <button class="primary-btn" id="auth-btn">Belépés</button>
            <button class="secondary-btn" id="toggle-auth">Még nincs fiókom: Regisztráció</button>
        </div>

        <div class="game-container hidden" id="game-ui">
            <h2 id="char-name-display" style="color: gold; margin: 5px;">-</h2>
            <img id="active-char-img" src="" alt="Karakter">
            <div class="stat-box">
                <span id="stat-hp" style="color: #ff4d4d;">❤️ 0</span>
                <span id="stat-atk" style="color: gold;">⚔️ 0</span>
                <span id="stat-gold" style="color: #ffd700;">💰 0</span>
            </div>
        </div>

        <div class="game-container hidden" id="wheel-ui">
            <h2 style="color: gold; margin: 0;">Szerencsekerék</h2>
            <div class="wheel-wrapper">
                <div class="wheel-pointer">▼</div>
                <canvas id="lucky-wheel-canvas" width="500" height="500"></canvas>
            </div>
            <button class="primary-btn" onclick="spinWheel()">Pörgetés!</button>
            <p id="wheel-result" style="color: gold; font-weight: bold; margin-top: 10px; min-height: 1.2em;"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAfEx0o1BDUjMiD6plcBGxrBh_n_bUHlI8", 
            authDomain: "porgetosjatek.firebaseapp.com", 
            projectId: "porgetosjatek", 
            storageBucket: "porgetosjatek.firebasestorage.app", 
            appId: "1:460225202442:web:701d5416bd407aa97d92f3" 
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const PRIZES = [
            { label: "100 Gold", color: "#1a1a1a", type: 'gold', val: 100 },
            { label: "+5 HP", color: "#2a2a2a", type: 'hp', val: 5 },
            { label: "20 Gold", color: "#1a1a1a", type: 'gold', val: 20 },
            { label: "+2 ATK", color: "#2a2a2a", type: 'atk', val: 2 },
            { label: "200 Gold", color: "#1a1a1a", type: 'gold', val: 200 },
            { label: "+10 HP", color: "#2a2a2a", type: 'hp', val: 10 },
            { label: "50 Gold", color: "#1a1a1a", type: 'gold', val: 50 },
            { label: "+1 ATK", color: "#2a2a2a", type: 'atk', val: 1 },
            { label: "10 Gold", color: "#1a1a1a", type: 'gold', val: 10 },
            { label: "+2 HP", color: "#2a2a2a", type: 'hp', val: 2 },
            { label: "JACKPOT", color: "#d4af37", type: 'gold', val: 500 },
            { label: "+5 ATK", color: "#2a2a2a", type: 'atk', val: 5 }
        ];

        let currentUser = null, currentRotation = 0, isSpinning = false, isLoginMode = true;

        // --- ERROR MODAL KEZELÉS ---
        window.showError = (msg) => {
            document.getElementById('error-message').innerText = msg;
            document.getElementById('error-modal').classList.remove('hidden');
        };
        window.closeError = () => {
            document.getElementById('error-modal').classList.add('hidden');
        };

        // --- AUTH VÁLTÓ ---
        document.getElementById('toggle-auth').onclick = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Bejelentkezés" : "Regisztráció";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Belépés" : "Hős Létrehozása";
            document.getElementById('toggle-auth').innerText = isLoginMode ? "Még nincs fiókom: Regisztráció" : "Már van fiókom: Bejelentkezés";
            document.getElementById('char-class').classList.toggle('hidden', isLoginMode);
        };

        // --- KERÉK RAJZOLÁS ---
        function drawWheel() {
            const canvas = document.getElementById("lucky-wheel-canvas");
            const ctx = canvas.getContext("2d");
            const centerX = 250, centerY = 250, radius = 240;
            const sliceAngle = (2 * Math.PI) / PRIZES.length;

            PRIZES.forEach((prize, i) => {
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.fillStyle = prize.color;
                ctx.fill();
                ctx.strokeStyle = "gold";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.fillStyle = "white";
                ctx.font = "bold 18px Arial";
                ctx.textAlign = "right";
                ctx.fillText(prize.label, radius - 20, 10);
                ctx.restore();
            });
        }

        window.spinWheel = async () => {
            if (isSpinning) return;
            isSpinning = true;
            const wheel = document.getElementById("lucky-wheel-canvas");
            const extra = Math.floor(Math.random() * 360);
            currentRotation += 1800 + extra;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(async () => {
                isSpinning = false;
                const actualAngle = currentRotation % 360;
                const prizeIndex = Math.floor(((360 - actualAngle) + 270) % 360 / (360 / PRIZES.length));
                const prize = PRIZES[prizeIndex];

                const userRef = doc(db, "users", currentUser.uid);
                await updateDoc(userRef, { [prize.type === 'gold' ? 'gold' : prize.type === 'hp' ? 'bonusHP' : 'bonusATK']: increment(prize.val) });
                document.getElementById("wheel-result").innerText = "Szerzemény: " + prize.label;
                updateUI();
            }, 5000);
        };

        async function updateUI() {
            if(!currentUser) return;
            const snap = await getDoc(doc(db, "users", currentUser.uid));
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('char-name-display').innerText = d.className;
                document.getElementById('active-char-img').src = d.className.toLowerCase() + ".jpg";
                document.getElementById('stat-hp').innerText = `❤️ ${100 + (d.bonusHP || 0)}`;
                document.getElementById('stat-atk').innerText = `⚔️ ${10 + (d.bonusATK || 0)}`;
                document.getElementById('stat-gold').innerText = `💰 ${d.gold || 0}`;
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('sidebar').classList.remove('hidden');
                drawWheel();
                updateUI();
                showSection('game-ui');
            }
        });

        window.showSection = (id) => {
            document.querySelectorAll('.game-container').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        // --- AUTH LOGIKA ---
        document.getElementById('auth-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const className = document.getElementById('char-class').value || "Kalandor";

            if(!email || !password) {
                showError("Kérlek töltsd ki az e-mail és jelszó mezőket!");
                return;
            }

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    const res = await createUserWithEmailAndPassword(auth, email, password);
                    // Új felhasználó alapadatai Firestore-ban
                    await setDoc(doc(db, "users", res.user.uid), {
                        className: className,
                        gold: 100,
                        bonusHP: 0,
                        bonusATK: 0
                    });
                }
            } catch (e) {
                let hungarianError = "Hiba történt a művelet során!";
                if(e.code === 'auth/invalid-credential') hungarianError = "Hibás e-mail vagy jelszó!";
                if(e.code === 'auth/email-already-in-use') hungarianError = "Ez az e-mail cím már foglalt!";
                if(e.code === 'auth/weak-password') hungarianError = "A jelszónak legalább 6 karakternek kell lennie!";
                
                showError(hungarianError);
            }
        };
    </script>
</body>
</html>
